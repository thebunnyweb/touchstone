name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[all]" pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v

      - name: Check imports
        run: |
          python -c "
          from touchstone import (
              Judge, Panel, Rubric,
              FACTUALITY, HELPFULNESS, SAFETY, RAG_QUALITY,
              JudgeResult, PanelResult, ComparisonResult,
              AnthropicProvider, OpenAIProvider, OllamaProvider,
              Calibration,
          )
          print('All imports OK')
          "

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - name: Check dist
        run: ls -lh dist/
